<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign In - Crootjs</title>
    <!-- Google Sign-In Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Abstract Blob Background for Dynamic Feel */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.25);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: rgba(168, 85, 247, 0.25);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        /* Glassmorphism Card styling */
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 1;
            width: 100%;
            max-width: 420px;
            text-align: center;
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 0.8s ease-out;
            position: relative;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), 0 0 20px var(--accent-glow);
            border-color: rgba(255, 255, 255, 0.15);
        }

        h2 {
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* Container for the Google button */
        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            min-height: 44px;
        }

        .g_id_signin {
            border-radius: 8px;
            overflow: hidden; /* To apply the scale smoothly without clipping */
            transition: transform 0.2s ease;
        }

        .g_id_signin:hover {
            transform: scale(1.03);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--card-border), transparent);
            margin: 2rem 0;
            border: none;
        }

        /* Result Container */
        #hasil-login {
            font-size: 0.95rem;
            color: var(--text-muted);
            min-height: 60px;
            padding: 1.2rem;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Smooth floating animation */
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 30px) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Make it perfect on mobile */
        @media (max-width: 480px) {
            .login-card {
                margin: 0 1.5rem;
                padding: 2.5rem 1.5rem;
            }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Blurred background shapes -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Main Card -->
    <div class="login-card">
        <h2>Selamat Datang</h2>
        <p class="subtitle">Silakan masuk menggunakan akun Google Anda</p>
        
        <!-- Google Conf -->
        <div id="g_id_onload"
             data-client_id="913953057682-rnnu6q9tvqfr6p960io76nm9fkio2m4i.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleLogin"
             data-auto_prompt="false">
        </div>
        
        <!-- Google Button UI -->
        <div class="google-btn-wrapper">
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="pill"
                 data-theme="filled_black"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>

        <hr class="divider">
        
        <div id="hasil-login">
            <i>Belum ada sesi login...</i>
        </div>
    </div>

    <!-- Frontend Handler Logic -->
    <script src="./main.js"></script>
</body>
</html>
